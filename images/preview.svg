<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">David Sabau website preview</title>
  <desc id="desc">Dark typewriter-style preview of David Sabau's personal website.</desc>
  <defs>
    <clipPath id="frame-clip">
      <rect x="4" y="4" width="1192" height="622" rx="22" />
    </clipPath>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.85 0 0 0 0 0.55 0 0 0 0.22 0" />
      <feBlend in="SourceGraphic" mode="screen" />
    </filter>
    <style>
      .bg { fill: #0b0f14; }
      .frame { fill: none; stroke: #2b3948; stroke-width: 1.4; }
      .name { fill: #e6edf3; font: 700 18px "American Typewriter", "Courier Prime", "Courier New", monospace; }
      .muted { fill: #778394; font: 400 18px "American Typewriter", "Courier Prime", "Courier New", monospace; }
      .nav { fill: #8d98a7; font: 700 18px "American Typewriter", "Courier Prime", "Courier New", monospace; }
      .prompt { fill: #73d9a7; font: 700 17px "American Typewriter", "Courier Prime", "Courier New", monospace; }
      .prompt-dollar { fill: #79c0ff; }
      .title { fill: #f0f4f8; font: 700 36px "American Typewriter", "Courier Prime", "Courier New", monospace; }
      .copy { fill: #b5beca; font: 400 21px "American Typewriter", "Courier Prime", "Courier New", monospace; }
      .small { fill: #b5beca; font: 400 18px "American Typewriter", "Courier Prime", "Courier New", monospace; }
      .blue { fill: #79c0ff; }
      .green { fill: #73d9a7; }
      .rule { stroke: #2f8a63; stroke-opacity: 0.42; stroke-width: 1; }
      .chip { fill: #12231c; stroke: #2f8a63; stroke-opacity: 0.58; }
      .grain { opacity: 0.13; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="630" />
  <g clip-path="url(#frame-clip)">
    <rect class="bg" width="1200" height="630" />
    <path class="grain" d="M0 36h1200M0 102h1200M0 171h1200M0 267h1200M0 363h1200M0 501h1200" stroke="#111b24" />
    <circle cx="82" cy="588" r="150" fill="#12231c" opacity="0.18" filter="url(#soft-glow)" />
    <circle cx="1098" cy="52" r="110" fill="#0d1f2d" opacity="0.2" filter="url(#soft-glow)" />

    <text class="name" x="32" y="40">David Sabau</text>
    <text class="muted" x="32" y="66">2026</text>

    <text class="nav" x="1138" y="40" text-anchor="end">Work</text>
    <text class="nav" x="1138" y="64" text-anchor="end">Writing</text>
    <g transform="translate(1123 88)" stroke="#778394" stroke-width="1.6" stroke-linecap="round" fill="none">
      <circle cx="7" cy="7" r="3.2" />
      <path d="M7 0.5v1.8M7 11.7v1.8M13.5 7h-1.8M2.3 7H0.5M11.6 2.4l-1.3 1.3M3.7 10.3l-1.3 1.3M11.6 11.6l-1.3-1.3M3.7 3.7 2.4 2.4" />
    </g>

    <g transform="translate(94 118)">
      <text class="prompt" x="0" y="0"><tspan class="prompt-dollar">$ </tspan>zabau.ceo / build log_</text>
      <text class="title" x="0" y="52">Useful products from</text>
      <text class="title" x="0" y="96">messy ideas.</text>

      <text class="copy" x="0" y="154">I build practical AI tools, ship quickly, and write down</text>
      <text class="copy" x="0" y="188">the parts worth remembering.</text>

      <text class="small" x="0" y="254">I build useful software and AI workflows.</text>
      <text class="small" x="0" y="284">I move fast from idea to working interface.</text>
      <text class="small" x="0" y="314">Product taste, automation, execution.</text>

      <line class="rule" x1="0" y1="366" x2="376" y2="366" />
      <text class="muted" x="0" y="392">01</text>
      <text class="name" x="42" y="392">Work</text>
      <text class="muted" x="376" y="392" text-anchor="end">5 projects</text>
      <line class="rule" x1="0" y1="414" x2="376" y2="414" />
      <text class="muted" x="0" y="440">02</text>
      <text class="name" x="42" y="440">Writing</text>
      <text class="muted" x="376" y="440" text-anchor="end">notes and reflections</text>
      <line class="rule" x1="0" y1="462" x2="376" y2="462" />

    </g>
  </g>
  <rect class="frame" x="4" y="4" width="1192" height="622" rx="22" />
</svg>
