<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Work | David Sabau</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta
      name="description"
      content="Selected product and AI projects by David Sabau."
    />
    <script>
      window.va =
        window.va ||
        function () {
          (window.vaq = window.vaq || []).push(arguments);
        };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script>
      (() => {
        const storedTheme = (() => {
          try {
            return localStorage.getItem("theme");
          } catch {
            return null;
          }
        })();
        const prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
        const theme = storedTheme || (prefersLight ? "light" : "dark");
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="work-page">
    <div class="site-root">
      <div class="blur" aria-hidden="true"></div>
      <div class="blur blur--bottom" aria-hidden="true"></div>

      <main>
        <div class="main-grid">
          <nav class="entry-back-link" aria-label="Back navigation">
            <a class="entry-back-link__anchor" href="./index.html" aria-label="Go back to index">
              <span class="entry-back-link__icon" aria-hidden="true">
                <svg viewBox="0 0 16 16" focusable="false">
                  <path
                    d="M4.5 3.5V11m0-7.5h7"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1.4"
                  />
                  <path
                    d="M4.75 3.75 12 11"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1.4"
                  />
                </svg>
              </span>
              <span class="entry-back-link__label"><em>Index</em></span>
            </a>
          </nav>

          <article class="prose prose--work-index" data-animation-controller="true">
            <header class="writing-index-header">
              <h1 data-animate>Work</h1>
            </header>

            <section class="work-list" data-animate style="--stagger: 1" aria-label="Selected work">
              <a class="work-entry" href="https://www.clearize.app" rel="noopener" target="_blank">
                <span class="work-entry__title">Clearize</span>
                <span class="work-entry__description">AI photo cleanup for real estate listings.</span>
              </a>

              <a class="work-entry" href="https://peerfindr.com" rel="noopener" target="_blank">
                <span class="work-entry__title">Peerfindr</span>
                <span class="work-entry__description">Competitor monitoring for product signals.</span>
              </a>

              <a class="work-entry" href="https://forkitt.vercel.app" rel="noopener" target="_blank">
                <span class="work-entry__title">Forkitt</span>
                <span class="work-entry__description">Startup discovery for niche product ideas.</span>
              </a>

              <a class="work-entry" href="https://trymodelmind.vercel.app" rel="noopener" target="_blank">
                <span class="work-entry__title">Modelmind</span>
                <span class="work-entry__description">A prediction game against leading AI models.</span>
              </a>
            </section>
          </article>
        </div>
      </main>

      <footer>
        <div>
          <span class="small lowcontrast">Selected projects and product experiments.</span>
          <span class="small lowcontrast tabular">2026</span>
          <div></div>
        </div>
      </footer>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
