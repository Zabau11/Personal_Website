<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Writing | David Sabau</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta
      name="description"
      content="Writing index with annual reflections and notes on product building, execution, and learning."
    />
    <script>
      window.va =
        window.va ||
        function () {
          (window.vaq = window.vaq || []).push(arguments);
        };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="writing-index-page">
    <div class="site-root">
      <div class="blur" aria-hidden="true"></div>
      <div class="blur blur--bottom" aria-hidden="true"></div>

      <main>
        <div class="main-grid">
          <nav class="entry-back-link" aria-label="Back navigation">
            <a class="entry-back-link__anchor" href="./index.html#notes" aria-label="Go back to index">
              <span class="entry-back-link__icon" aria-hidden="true">
                <svg viewBox="0 0 16 16" focusable="false">
                  <path
                    d="M4.5 3.5V11m0-7.5h7"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1.4"
                  />
                  <path
                    d="M4.75 3.75 12 11"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1.4"
                  />
                </svg>
              </span>
              <span class="entry-back-link__label"><em>Index</em></span>
            </a>
          </nav>

          <article class="prose prose--writing-index" data-animation-controller="true">
            <header class="writing-index-header">
              <h1 data-animate>Writing</h1>
            </header>

            <section class="writing-list" data-animate style="--stagger: 1">
              <ul class="writing-list__items">
                <li class="writing-entry">
                  <a class="writing-entry__link" href="./2026.html">
                    <span class="writing-entry__title">2026 So Far</span>
                    <span class="writing-entry__date tabular">04/19</span>
                  </a>
                </li>
                <li class="writing-entry">
                  <a class="writing-entry__link" href="./2025.html">
                    <span class="writing-entry__title">Annual Reflection 2025</span>
                    <span class="writing-entry__date tabular">12/31</span>
                  </a>
                </li>
                <li class="writing-entry writing-entry--placeholder">
                  <span class="writing-entry__title">More notes coming soon</span>
                  <span class="writing-entry__date tabular">--/--</span>
                </li>
              </ul>
            </section>
          </article>
        </div>
      </main>

      <footer>
        <div>
          <span class="small lowcontrast">A growing archive of notes and yearly reflections.</span>
          <span class="small lowcontrast tabular">2026</span>
          <div></div>
        </div>
      </footer>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
